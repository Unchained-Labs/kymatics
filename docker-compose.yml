services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: otter
      POSTGRES_PASSWORD: otter
      POSTGRES_DB: otter
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otter -d otter"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  otter-server:
    build:
      context: ./otter
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      OTTER_DATABASE_URL: postgres://otter:otter@postgres:5432/otter
      OTTER_REDIS_URL: redis://redis:6379
      OTTER_LISTEN_ADDR: 0.0.0.0:8080
      OTTER_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:80,http://localhost:5173,http://seal:80
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  otter-worker:
    build:
      context: ./otter
      dockerfile: Dockerfile
    entrypoint: ["/usr/local/bin/otter-worker"]
    environment:
      OTTER_DATABASE_URL: postgres://otter:otter@postgres:5432/otter
      OTTER_REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  seal:
    build:
      context: ./seal
      dockerfile: .docker/Dockerfile
      args:
        VITE_OTTER_URL: http://localhost:8080
    ports:
      - "3000:80"
    depends_on:
      - otter-server

  landing:
    build:
      context: ./landing
      dockerfile: .docker/Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - otter-server

volumes:
  postgres_data:
