services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: otter
      POSTGRES_USER: otter
      POSTGRES_PASSWORD: otter
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otter -d otter"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  lavoix:
    build:
      context: ./lavoix
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      # Explicitly required secrets/runtime vars from root .env
      LAVOIX_MISTRAL_API_KEY: ${MISTRAL_API_KEY:?Set MISTRAL_API_KEY in kymatics/.env}
      LAVOIX_VOXTRAL_MODEL: ${LAVOIX_VOXTRAL_MODEL:-voxtral-mini-latest}
      LAVOIX_VOXTRAL_TTS_MODEL: ${LAVOIX_VOXTRAL_TTS_MODEL:-voxtral-tts-latest}
      LAVOIX_DEFAULT_STT_PROVIDER: ${LAVOIX_DEFAULT_STT_PROVIDER:-mistral}
      LAVOIX_DEFAULT_TTS_PROVIDER: ${LAVOIX_DEFAULT_TTS_PROVIDER:-mistral}
      LAVOIX_HOST: 0.0.0.0
      LAVOIX_PORT: 8090
    ports:
      - "${LAVOIX_PORT:-8090}:8090"
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:8090/healthz >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  otter-server:
    build:
      context: ./otter
      dockerfile: Dockerfile
      args:
        BIN_NAME: otter-server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      lavoix:
        condition: service_started
    env_file:
      - ./.env
    environment:
      # Explicitly required secrets/runtime vars from root .env
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:?Set MISTRAL_API_KEY in kymatics/.env}
      OTTER_DATABASE_URL: postgres://otter:otter@postgres:5432/otter
      OTTER_REDIS_URL: redis://redis:6379
      OTTER_LISTEN_ADDR: 0.0.0.0:8080
      OTTER_VIBE_BIN: vibe
      OTTER_VIBE_HOME_BASE: /var/lib/otter/vibe
      OTTER_MIGRATIONS_DIR: /srv/otter/migrations
      OTTER_MAX_ATTEMPTS: ${OTTER_MAX_ATTEMPTS:-5}
      OTTER_WORKER_CONCURRENCY: ${OTTER_WORKER_CONCURRENCY:-2}
      OTTER_ALLOWED_ROOTS: /workspaces
      OTTER_CORS_ALLOWED_ORIGINS: ${OTTER_CORS_ALLOWED_ORIGINS:-*}
      OTTER_DEFAULT_WORKSPACE_PATH: /workspaces
      OTTER_DEFAULT_WORKSPACE_SUBDIR: ${OTTER_DEFAULT_WORKSPACE_SUBDIR:-auto}
      OTTER_API_BASE_URL: ${OTTER_API_BASE_URL:-http://otter-server:8080}
      OTTER_LAVOIX_URL: http://lavoix:8090
      OTTER_RUNTIME_ENABLED: ${OTTER_RUNTIME_ENABLED:-true}
      OTTER_RUNTIME_DOCKER_SOCKET: ${OTTER_RUNTIME_DOCKER_SOCKET:-unix:///var/run/docker.sock}
      OTTER_RUNTIME_NETWORK: ${OTTER_RUNTIME_NETWORK:-kymatics_default}
      OTTER_RUNTIME_CONTAINER_PREFIX: ${OTTER_RUNTIME_CONTAINER_PREFIX:-otter-ws}
      OTTER_RUNTIME_IMAGE_PREFIX: ${OTTER_RUNTIME_IMAGE_PREFIX:-otter/workspace}
      OTTER_RUNTIME_DEFAULT_HOST: ${OTTER_RUNTIME_DEFAULT_HOST:-http://localhost}
      OTTER_RUNTIME_MAX_LOG_LINES: ${OTTER_RUNTIME_MAX_LOG_LINES:-2000}
      RUST_LOG: ${OTTER_RUST_LOG:-info}
    ports:
      - "${OTTER_PORT:-8080}:8080"
    volumes:
      - ./otter/workspaces:/workspaces
      - vibe_state:/var/lib/otter/vibe
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  otter-worker:
    build:
      context: ./otter
      dockerfile: Dockerfile
      args:
        BIN_NAME: otter-worker
    entrypoint: ["/usr/local/bin/otter-worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      # Explicitly required secrets/runtime vars from root .env
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:?Set MISTRAL_API_KEY in kymatics/.env}
      OTTER_DATABASE_URL: postgres://otter:otter@postgres:5432/otter
      OTTER_REDIS_URL: redis://redis:6379
      OTTER_VIBE_BIN: vibe
      OTTER_VIBE_HOME_BASE: /var/lib/otter/vibe
      OTTER_MIGRATIONS_DIR: /srv/otter/migrations
      OTTER_MAX_ATTEMPTS: ${OTTER_MAX_ATTEMPTS:-5}
      OTTER_ALLOWED_ROOTS: /workspaces
      OTTER_DEFAULT_WORKSPACE_PATH: /workspaces
      OTTER_DEFAULT_WORKSPACE_SUBDIR: ${OTTER_DEFAULT_WORKSPACE_SUBDIR:-auto}
      OTTER_API_BASE_URL: ${OTTER_API_BASE_URL:-http://otter-server:8080}
      OTTER_RUNTIME_ENABLED: ${OTTER_RUNTIME_ENABLED:-true}
      OTTER_RUNTIME_DOCKER_SOCKET: ${OTTER_RUNTIME_DOCKER_SOCKET:-unix:///var/run/docker.sock}
      OTTER_RUNTIME_NETWORK: ${OTTER_RUNTIME_NETWORK:-kymatics_default}
      OTTER_RUNTIME_CONTAINER_PREFIX: ${OTTER_RUNTIME_CONTAINER_PREFIX:-otter-ws}
      OTTER_RUNTIME_IMAGE_PREFIX: ${OTTER_RUNTIME_IMAGE_PREFIX:-otter/workspace}
      OTTER_RUNTIME_DEFAULT_HOST: ${OTTER_RUNTIME_DEFAULT_HOST:-http://localhost}
      OTTER_RUNTIME_MAX_LOG_LINES: ${OTTER_RUNTIME_MAX_LOG_LINES:-2000}
      RUST_LOG: ${OTTER_RUST_LOG:-info}
    volumes:
      - ./otter/workspaces:/workspaces
      - vibe_state:/var/lib/otter/vibe
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  seal:
    build:
      context: ./seal
      dockerfile: .docker/Dockerfile
      args:
        VITE_OTTER_URL: ${VITE_OTTER_URL:-/api}
    image: seal:local
    depends_on:
      otter-server:
        condition: service_started
    environment:
      OTTER_UPSTREAM: http://otter-server:8080
    ports:
      - "${SEAL_PORT:-5173}:80"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  vibe_state:
